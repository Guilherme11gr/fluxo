# FluXo Runner Config
# Preencha explicitamente para uso local.

runner:
  api_url: "http://localhost:3005/api/agent"
  api_key_env: "FLUXO_AGENT_API_KEY"
  poll_interval_sec: 30
  heartbeat_interval_sec: 60

agents:
  - name: "local-dev"
    tool: "claude"
    project_id: "00000000-0000-0000-0000-000000000000"
    workdir: "/path/to/your/repo"
    pick_status: "TODO"
    claim_status: "DOING"
    done_status: "DONE"
    next_assignee_id: null
    timeout: 300
    context: |
      Local runner profile. Update this block for your repo before using.
