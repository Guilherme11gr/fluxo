# FluXo Runner Config — Minimal Bootstrap
#
# Agent profiles are fetched from the FluXo API automatically.
# Configure agents in the FluXo UI → Settings → Runners
#
# Quick start (no config file needed):
#   fluxo-runner run --api-key agk_xxx

runner:
  api_url: "https://fluxo.agenda-aqui.com/api/agent"
  api_key_env: "AGENT_API_KEY"
  poll_interval_sec: 30
  heartbeat_interval_sec: 60
  sync_interval_sec: 120        # How often to re-fetch agents from API

# No agents section needed — they come from the API!
# But if you want to override with local config, you can:
#
# agents:
#   - name: "dev-agent"
#     tool: "opencode"
#     model: "zai-coding-plan/glm-5.1"
#     project_id: "9f6d9015-b19a-441c-a8d1-52d507d50eda"
#     pick_status: "TODO"
#     claim_status: "DOING"
#     done_status: "DONE"
#     timeout: 300